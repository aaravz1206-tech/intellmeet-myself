services:
  - type: web
    name: intellmeet-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        value: "" # You can add your MongoDB URL here later if you want user accounts
